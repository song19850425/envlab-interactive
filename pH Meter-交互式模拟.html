<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>pH Meter · 交互式模拟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0f0;font-family:'Inter',system-ui,'PingFang SC',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;user-select:none}
.app{width:100%;max-width:960px;max-height:100vh;padding:16px;display:flex;flex-direction:column;gap:12px}
h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
h1 span{font-size:11px;font-weight:400;color:#8888aa}
.bench{background:#16213e;border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px;position:relative;overflow:hidden;min-height:340px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:center}
.beaker{width:90px;height:120px;border-radius:0 0 12px 12px;border:2px solid rgba(255,255,255,.15);border-top:none;position:relative;cursor:pointer;transition:.25s;background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px}
.beaker:hover{transform:translateY(-6px);border-color:rgba(0,180,255,.4)}
.beaker.ac{border-color:#00b4ff;box-shadow:0 0 20px rgba(0,180,255,.2);transform:translateY(-6px)}
.beaker .label{font-size:10px;color:#8888aa;margin-bottom:6px;text-align:center;line-height:1.3;max-width:80px}
.beaker .liquid{position:absolute;bottom:0;left:2px;right:2px;border-radius:0 0 10px 10px;transition:background .5s;height:70px}
.beaker .lbl{position:absolute;bottom:-20px;font-size:10px;color:#666;white-space:nowrap}
.meter{background:#0f1629;border-radius:14px;border:1px solid rgba(255,255,255,.08);padding:24px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.meter-display{text-align:center}
.meter .ph-val{font-size:64px;font-weight:900;line-height:1;transition:color .3s;letter-spacing:-2px}
.meter .ph-unit{font-size:14px;color:#8888aa;margin-top:2px}
.meter .ph-label{font-size:12px;margin-top:6px;font-weight:500}
.meter-scale{width:100%;max-width:300px;height:12px;border-radius:6px;margin:8px auto 0;position:relative;overflow:hidden}
.meter-fill{height:100%;border-radius:6px;transition:width .8s ease,background .8s;width:50%}
.scale-labels{display:flex;justify-content:space-between;font-size:9px;color:#666;max-width:300px;margin:2px auto 0}
.meter-controls{display:flex;flex-direction:column;gap:8px;min-width:180px}
.ctrl-row{display:flex;align-items:center;gap:8px}
.ctrl-row label{font-size:10px;color:#8888aa;min-width:50px}
.ctrl-row input[type=range]{flex:1;accent-color:#00b4ff;height:4px}
.ctrl-row .val{font-size:11px;font-weight:600;min-width:30px;text-align:right}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:500;cursor:pointer;transition:.2s;font-family:inherit}
.btn-blue{background:#00b4ff;color:#fff}
.btn-blue:hover{background:#0098d8}
.btn-pink{background:#ff0080;color:#fff}
.btn-pink:hover{background:#d8006b}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:#ccc}
.btn-outline:hover{background:rgba(255,255,255,.05)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03);font-size:11px;color:#8888aa}
.status .dot{width:8px;height:8px;border-radius:50%;background:#8888aa}
.status .dot.ok{background:#00ff80}
.status .dot.warn{background:#ffcc00}
.status .dot.err{background:#ff4444}
.log-area{background:#0f1629;border-radius:10px;border:1px solid rgba(255,255,255,.06);padding:12px;max-height:100px;overflow-y:auto;font-size:11px;color:#8888aa;line-height:1.8;font-family:monospace}
.log-area div span.time{color:#444;margin-right:6px}
@media(max-width:700px){.meter{grid-template-columns:1fr}.meter .ph-val{font-size:48px}.bench{min-height:280px}.beaker{width:70px;height:90px}.beaker .liquid{height:50px}}
</style></head><body>
<div class="app">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
<h1>🧪 pH Meter <span>交互式模拟 · 参照 HJ 1147-2020</span></h1>
<div class="status" id="status"><span class="dot" id="statusDot"></span><span id="statusText">就绪 — 选择溶液开始测量</span></div>
</div>

<div class="bench" id="bench">
<div class="beaker" onclick="selectB(0)" id="b0"><div class="liquid" id="l0" style="background:#ff4444"></div><div class="label">pH 4.00<br>缓冲液</div><span class="lbl">标准液</span></div>
<div class="beaker" onclick="selectB(1)" id="b1"><div class="liquid" id="l1" style="background:#f0e68c"></div><div class="label">pH 6.86<br>缓冲液</div><span class="lbl">标准液</span></div>
<div class="beaker" onclick="selectB(2)" id="b2"><div class="liquid" id="l2" style="background:#3a7bd5"></div><div class="label">pH 9.18<br>缓冲液</div><span class="lbl">标准液</span></div>
<div class="beaker" onclick="selectB(3)" id="b3"><div class="liquid" id="l3" style="background:#87ceeb"></div><div class="label">自来水<br>样品</div><span class="lbl">水样</span></div>
<div class="beaker" onclick="selectB(4)" id="b4"><div class="liquid" id="l4" style="background:#7cfc00"></div><div class="label">河水<br>样品</div><span class="lbl">水样</span></div>
<div class="beaker" onclick="selectB(5)" id="b5"><div class="liquid" id="l5" style="background:#ff8c00"></div><div class="label">工业废水<br>样品</div><span class="lbl">水样</span></div>
</div>

<div class="meter">
<div class="meter-display">
<div class="ph-val" id="phDisplay">7.00</div>
<div class="ph-unit">pH</div>
<div class="ph-label" id="phLabel" style="color:#8888aa">选择溶液开始测量</div>
<div class="meter-scale" style="background:linear-gradient(90deg,#ff3333,#ff9933,#ffcc00,#66cc66,#3399ff,#6633cc)"><div class="meter-fill" id="meterFill"></div></div>
<div class="scale-labels"><span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>14</span></div>
</div>
<div class="meter-controls">
<div class="ctrl-row"><label>🌡️ 温度</label><input type="range" min="0" max="50" value="25" id="tempSlider" oninput="setTemp(this.value)"><span class="val" id="tempVal">25°C</span></div>
<div class="ctrl-row" style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn btn-outline" onclick="calibrate(0)" id="calBtn0">校准 pH 4.00</button>
<button class="btn btn-outline" onclick="calibrate(1)" id="calBtn1">校准 pH 6.86</button>
<button class="btn btn-outline" onclick="calibrate(2)" id="calBtn2">校准 pH 9.18</button>
</div>
<div class="ctrl-row" style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn btn-blue" onclick="measure()" id="measureBtn">📊 记录读数</button>
<button class="btn btn-pink" onclick="resetAll()">↺ 重置</button>
</div>
<div style="font-size:10px;color:#555">校准状态：<span id="calStatus">未校准</span></div>
</div>
</div>

<div class="log-area" id="logArea"><div><span class="time">[启动]</span> 系统就绪。请先校准电极，然后选择溶液测量。</div></div>
</div>

<script>
const samples = [
  {name:'pH 4.00 缓冲液',ph:4.00,type:'std',color:'#ff4444',desc:'标准缓冲液（邻苯二甲酸氢钾）'},
  {name:'pH 6.86 缓冲液',ph:6.86,type:'std',color:'#f0e68c',desc:'标准缓冲液（混合磷酸盐）'},
  {name:'pH 9.18 缓冲液',ph:9.18,type:'std',color:'#3a7bd5',desc:'标准缓冲液（四硼酸钠）'},
  {name:'自来水样品',ph:7.8,type:'sample',color:'#87ceeb',desc:'生活饮用水'},
  {name:'河水样品',ph:6.5,type:'sample',color:'#7cfc00',desc:'地表水（GB 3838 Ⅲ类）'},
  {name:'工业废水样品',ph:3.2,type:'sample',color:'#ff8c00',desc:'pH超标-酸性废水'}
];

let selected = 0;
let temperature = 25;
let calibrated = [false, false, false];
let lastCalTemp = 25;
let log = [];

function selectB(n) {
  selected = n;
  document.querySelectorAll('.beaker').forEach((b,i)=>b.classList.toggle('ac',i===n));
  let s = samples[n];
  let ph = s.ph;
  // Apply calibration offset
  let offset = calcOffset();
  let display = ph + offset;
  // Temperature compensation
  let tempCoeff = (temperature - 25) * 0.003;
  display += tempCoeff;
  display = Math.max(0, Math.min(14, display));
  
  updateMeter(display, s);
  addLog(`选择 ${s.name}（${s.type==='std'?'标准液':'水样'}）`);
}

function calcOffset() {
  let calibratedCount = calibrated.filter(Boolean).length;
  if (calibratedCount === 0) return 0.3; // uncalibrated offset
  
  // Simple offset based on calibration quality
  if (calibratedCount >= 3) return 0;
  if (calibratedCount >= 2) return 0.05;
  return 0.1;
}

function updateMeter(val, sample) {
  let display = document.getElementById('phDisplay');
  let fill = document.getElementById('meterFill');
  let label = document.getElementById('phLabel');
  
  let pct = (val / 14) * 100;
  fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
  
  display.textContent = val.toFixed(2);
  
  // Color based on pH
  let hue;
  if (val < 3) hue = 0;  // red
  else if (val < 5) hue = 15;  // orange-red
  else if (val < 6.5) hue = 40; // orange-yellow
  else if (val < 7.5) hue = 120;  // green (neutral)
  else if (val < 9) hue = 200;  // blue
  else if (val < 11) hue = 240;  // indigo
  else hue = 280;  // purple
  
  let color = `hsl(${hue}, 80%, ${val > 2 && val < 12 ? 50 : 40}%)`;
  display.style.color = color;
  fill.style.background = color;
  
  // Label
  let desc = sample ? sample.desc : '';
  let type;
  if (val < 5.6) type = '酸性';
  else if (val < 7.0) type = '弱酸性';
  else if (val < 7.5) type = '中性';
  else if (val < 8.5) type = '弱碱性';
  else type = '碱性';
  
  let calInfo = calibrated.filter(Boolean).length === 3 ? ' ✅ 已校准' : 
                calibrated.filter(Boolean).length > 0 ? ' ⚠️ 部分校准' : ' ❌ 未校准';
  label.textContent = `${type} · ${desc || ''} ${calInfo}`;
  label.style.color = color;
}

function setTemp(v) {
  temperature = parseFloat(v);
  document.getElementById('tempVal').textContent = v + '°C';
  // Re-read current sample with new temperature
  let s = samples[selected];
  let offset = calcOffset();
  let ph = s.ph + offset + (temperature - 25) * 0.003;
  ph = Math.max(0, Math.min(14, ph));
  updateMeter(ph, s);
  addLog(`温度调整为 ${v}°C`);
}

function calibrate(n) {
  let s = samples[n];
  let expected = s.ph;
  let tolerance = 0.05;
  
  // Simulate calibration
  calibrated[n] = true;
  document.getElementById('calBtn'+n).style.background = 'rgba(0,255,128,.15)';
  document.getElementById('calBtn'+n).style.borderColor = '#00ff80';
  document.getElementById('calBtn'+n).style.color = '#00ff80';
  document.getElementById('calBtn'+n).textContent = `✅ ${s.name}`;
  
  let count = calibrated.filter(Boolean).length;
  document.getElementById('calStatus').textContent = `${count}/3 点校准完成`;
  document.getElementById('calStatus').style.color = count === 3 ? '#00ff80' : '#ffcc00';
  
  addLog(`✅ ${s.name} 校准完成`);
  
  if (count === 3) {
    addLog('🎯 三点校准完成，仪器精度 ±0.02 pH');
  }
}

function measure() {
  let s = samples[selected];
  let offset = calcOffset();
  let ph = s.ph + offset + (temperature - 25) * 0.003;
  ph = Math.max(0, Math.min(14, ph));
  
  let time = new Date().toLocaleTimeString();
  let type = s.type === 'std' ? '标准液' : '水样';
  let calNote = calibrated.filter(Boolean).length < 3 ? '（未充分校准）' : '';
  
  addLog(`📝 [${time}] ${s.name}: pH ${ph.toFixed(2)}${calNote}`);
  
  // Flash effect
  let btn = document.getElementById('measureBtn');
  btn.textContent = '✅ 已记录';
  setTimeout(() => { btn.textContent = '📊 记录读数'; }, 1000);
}

function addLog(msg) {
  let t = new Date();
  let ts = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
  let area = document.getElementById('logArea');
  area.innerHTML += `<div><span class="time">[${ts}]</span> ${msg}</div>`;
  area.scrollTop = area.scrollHeight;
  
  // Status
  let dot = document.getElementById('statusDot');
  let txt = document.getElementById('statusText');
  if (msg.includes('✅')) { dot.className = 'dot ok'; txt.textContent = msg; }
  else if (msg.includes('⚠️')) { dot.className = 'dot warn'; txt.textContent = msg; }
  else if (msg.includes('❌')) { dot.className = 'dot err'; txt.textContent = msg; }
  else { dot.className = 'dot ok'; txt.textContent = msg; }
}

function resetAll() {
  calibrated = [false, false, false];
  for (let i = 0; i < 3; i++) {
    let btn = document.getElementById('calBtn'+i);
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.textContent = ['校准 pH 4.00','校准 pH 6.86','校准 pH 9.18'][i];
  }
  document.getElementById('calStatus').textContent = '未校准';
  document.getElementById('calStatus').style.color = '#8888aa';
  temperature = 25;
  document.getElementById('tempSlider').value = 25;
  document.getElementById('tempVal').textContent = '25°C';
  selected = 0;
  document.querySelectorAll('.beaker').forEach((b,i)=>b.classList.toggle('ac',i===0));
  
  updateMeter(7.0, samples[0]);
  document.getElementById('logArea').innerHTML = '';
  addLog('🔄 已重置，请重新校准并测量');
}

// Init
updateMeter(7.0, samples[0]);
addLog('💡 提示：先校准三点（4.00/6.86/9.18），再测量水样');
</script>
</body></html>
