<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>监测方案智能生成器 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif+SC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f172a;--ink-light:#475569;--paper:#f8fafc;--sky:#0284c7;--sky-light:#e0f2fe;--teal:#0d9488;--border:#e2e8f0;--serif:'Noto Serif SC',serif;--sans:'Inter','PingFang SC','Microsoft YaHei',sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink)}
#sp{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--sky),var(--teal));z-index:1000;transition:width .1s}
.app{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 20px}
header h1{font-family:var(--serif);font-size:clamp(24px,4vw,36px);font-weight:900}
header h1 em{font-style:normal;color:var(--sky)}
header p{color:var(--ink-light);font-size:13px;margin-top:6px}
.steps{display:flex;justify-content:center;gap:4px;max-width:800px;margin:16px auto}
.si{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:600;color:#94a3b8}
.si .sn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#e2e8f0;color:#94a3b8;font-weight:700;font-size:12px;transition:.3s}
.si.ac .sn{background:var(--sky);color:#fff}.si.done .sn{background:var(--teal);color:#fff}
.si.ac{color:var(--sky)}.si.done{color:var(--teal)}
.panel{display:none;background:#fff;border-radius:14px;border:1px solid var(--border);padding:28px;margin-top:12px}
.panel.ac{display:block}
h2.section-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
h2.section-title .st-badge{font-size:10px;background:var(--sky-light);color:var(--sky);padding:2px 8px;border-radius:8px;font-weight:600}
h3.sub-title{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--ink)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ink-light);margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--sans);background:#fff;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.form-group textarea{min-height:50px;resize:vertical}
.form-full{grid-column:1/-1}
.hint{font-size:10px;color:var(--ink-light);margin-top:3px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{padding:10px 24px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.3s}
.btn-pri{background:linear-gradient(135deg,var(--sky),#0369a1);color:#fff}
.btn-pri:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(2,132,199,.25)}
.btn-sec{background:#f1f5f9;color:var(--ink);border:1px solid var(--border)}
.btn-sec:hover{background:#e2e8f0}
.btn-suc{background:linear-gradient(135deg,var(--teal),#0f766e);color:#fff}
.btn-suc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.25)}

/* UNIT SELECTOR */
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.unit-card{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.25s}
.unit-card:hover{border-color:var(--sky);background:var(--sky-light)}
.unit-card.ac{border-color:var(--sky);background:var(--sky-light)} 
.unit-card .un{font-weight:600;font-size:13px;margin-bottom:2px}
.unit-card .ud{font-size:11px;color:var(--ink-light)}
.unit-card .ur{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#f1f5f9;color:var(--ink-light)}

/* RESULT */
.result-doc{padding:0 4px}
.doc-section{margin-bottom:24px;page-break-inside:avoid}
.doc-section h3{font-size:15px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--sky-light);color:var(--ink)}
.doc-section h4{font-size:13px;font-weight:600;margin:10px 0 6px;color:var(--ink)}
.doc-section p,.doc-section li{font-size:12px;line-height:1.8;color:var(--ink-light)}
.doc-section .doc-ref{background:#f8fafc;border-radius:6px;padding:10px;font-size:11px;line-height:1.7;margin:6px 0}
.doc-section table.doc-table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.doc-section table.doc-table th{background:#f1f5f9;padding:5px 6px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);font-size:10px}
.doc-section table.doc-table td{padding:4px 6px;border-bottom:1px solid var(--border)}
.doc-section table.doc-table tr:hover td{background:#fafafa}
.doc-toc{background:#f8fafc;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:12px;line-height:2.2}
.doc-toc strong{font-size:13px}
.doc-toc span{cursor:pointer;color:var(--sky);margin-right:12px;font-size:11px}
.doc-toc span:hover{text-decoration:underline}
.doc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
@media(max-width:700px){.form-grid,.unit-grid{grid-template-columns:1fr}.panel{padding:16px}}
</style></head><body>
<div id="sp"></div>
<div class="app">
<header>
<h1>监测方案<em>智能生成器</em> v2</h1>
<p>基于 HJ 25.1-2019 / HJ 1209-2021 等标准，输入项目信息自动生成完整监测方案文档</p>
<div class="steps">
<div class="si ac" id="si0"><span class="sn">1</span><span>项目与概况</span></div>
<div class="si" id="si1"><span class="sn">2</span><span>重点单元</span></div>
<div class="si" id="si2"><span class="sn">3</span><span>生成方案</span></div>
</div>
</header>

<!-- ====== STEP 1: PROJECT INFO ====== -->
<div class="panel ac" id="p0">
<h2 class="section-title">项目与概况</h2>

<h3 class="sub-title">📋 项目信息</h3>
<div class="form-grid">
<div class="form-group"><label>项目名称 *</label><input id="projName" value="某地块土壤污染状况调查"></div>
<div class="form-group"><label>地块面积 (m²) *</label><input type="number" id="area" value="5000"></div>
<div class="form-group"><label>地块类型 *</label>
<select id="landType"><option value="construction">建设用地</option><option value="agriculture">农用地</option></select></div>
<div class="form-group"><label>规划用途 *</label>
<select id="useType"><option value="1">第一类用地（居住/学校/公园）</option><option value="2">第二类用地（工业/商业/物流）</option></select></div>
<div class="form-group"><label>所属行业 *</label>
<select id="industry" onchange="updatePollutants()">
<option value="">— 请选择 —</option>
<option value="chemical">化工原料及化学品制造</option>
<option value="petro">石油加工/炼焦</option>
<option value="metal">有色金属冶炼/压延</option>
<option value="electro">电气机械/电子设备制造</option>
<option value="machinery">通用/专用设备制造</option>
<option value="textile">纺织/印染</option>
<option value="leather">皮革/制革</option>
<option value="paper">造纸及纸制品</option>
<option value="pharma">医药制造</option>
<option value="pesticide">农药制造</option>
<option value="plating">金属表面处理/电镀</option>
<option value="rubber">橡胶/塑料制品</option>
<option value="battery">电池制造</option>
<option value="smelt">黑色金属冶炼</option>
<option value="coking">炼焦</option>
<option value="gas">燃气生产/供应</option>
<option value="waste">固废处置/垃圾焚烧</option>
<option value="mining">采矿/选矿</option>
<option value="other">其他</option>
</select></div>
<div class="form-group"><label>关注介质 *</label>
<select id="media"><option value="both">土壤 + 地下水</option><option value="soil">仅土壤</option><option value="gw">仅地下水</option></select></div>
</div>

<h3 class="sub-title">🏢 企业信息（如适用）</h3>
<div class="form-grid">
<div class="form-group"><label>企业名称</label><input id="compName" placeholder="如无则留空"></div>
<div class="form-group"><label>法定代表人</label><input id="legalPerson" placeholder="—"></div>
<div class="form-group"><label>统一社会信用代码</label><input id="creditCode" placeholder="—"></div>
<div class="form-group"><label>所在地</label><input id="location" placeholder="XX省XX市XX区"></div>
<div class="form-group form-full"><label>地块历史简述</label><textarea id="history" rows="3">该地块曾用于化工生产，涉及有机溶剂和重金属使用，已停产3年。地块内现有生产车间、储罐区、污水处理站等设施。</textarea></div>
</div>

<h3 class="sub-title">🌍 区域环境概况</h3>
<div class="form-grid">
<div class="form-group"><label>地形地貌</label>
<select id="topography"><option value="冲洪积平原">冲洪积平原</option><option value="山前倾斜平原">山前倾斜平原</option><option value="丘陵">丘陵</option><option value="山地">山地</option><option value="盆地">盆地</option></select></div>
<div class="form-group"><label>地下水埋深 (m)</label><input type="text" id="gwDepth" value="20~60"></div>
<div class="form-group"><label>地下水流向</label><input id="gwFlow" value="西北向东南"></div>
<div class="form-group"><label>地表水体</label><input id="surfaceWater" value="地块西侧约1.4km为大沙河（季节性河流）"></div>
</div>

<div class="btn-row">
<button class="btn btn-pri" onclick="goStep(1)">下一步：重点单元识别 →</button>
</div>
</div>

<!-- ====== STEP 2: UNIT SELECTION ====== -->
<div class="panel" id="p1">
<h2 class="section-title">重点单元识别与分级 <span class="st-badge">HJ 1209-2021</span></h2>
<p style="font-size:12px;color:var(--ink-light);margin-bottom:12px">根据 HJ 1209-2021，选择地块内现有的重点区域，系统将根据区域类型自动分级并确定监测方案。点击卡片选择/取消。</p>

<div class="unit-grid" id="unitGrid"></div>

<h3 class="sub-title">🧪 特征污染物筛选</h3>
<p style="font-size:11px;color:var(--ink-light);margin-bottom:6px">行业推荐污染物（已预选），点击可调整：</p>
<div id="pollutantTags" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px"></div>

<div class="btn-row">
<button class="btn btn-sec" onclick="goStep(0)">← 上一步</button>
<button class="btn btn-pri" onclick="goStep(2)">生成完整方案 →</button>
</div>
</div>

<!-- ====== STEP 3: GENERATE ====== -->
<div class="panel" id="p2">
<h2 class="section-title">📄 监测方案</h2>
<div class="doc-actions">
<button class="btn btn-suc" onclick="window.print()">🖨️ 打印/导出PDF</button>
<button class="btn btn-sec" onclick="goStep(1)">← 修改参数</button>
</div>
<div class="result-doc" id="docContent"></div>
</div>

<footer style="text-align:center;padding:30px;color:var(--ink-light);font-size:11px;border-top:1px solid var(--border);margin-top:30px">
环境检测 · 交互式教学 | 联系方式：jinghao.song@gmail.com
</footer>
</div>

<script>
// ===== DATA =====
const indP = {
  chemical:{name:'化工原料及化学品制造',rec:['苯','甲苯','二甲苯','氯仿','四氯化碳','苯胺','硝基苯','As','Hg']},
  petro:{name:'石油加工',rec:['石油烃(C10-C40)','苯','甲苯','乙苯','二甲苯','萘','苯并[a]芘']},
  metal:{name:'有色金属冶炼',rec:['As','Cd','Pb','Cu','Zn','Hg','Ni','Sb','CN-','F-']},
  electro:{name:'电子设备制造',rec:['丙酮','异丙醇','苯','甲苯','二甲苯','三氯乙烯','Pb']},
  machinery:{name:'设备制造',rec:['石油烃(C10-C40)','Pb','Zn','Cr','苯系物']},
  textile:{name:'纺织印染',rec:['苯胺','硝基苯','Cr','Cu','Zn']},
  leather:{name:'皮革制革',rec:['Cr6+','Cr','As','苯酚','甲醛','石油烃']},
  paper:{name:'造纸',rec:['氯仿','苯酚','甲苯','二甲苯','As','Hg','Pb']},
  pharma:{name:'医药制造',rec:['丙酮','甲醇','异丙醇','苯','甲苯','二甲苯','氯仿']},
  pesticide:{name:'农药制造',rec:['六六六','滴滴涕','敌敌畏','乐果','As']},
  plating:{name:'电镀',rec:['Cr6+','Ni','Cu','Zn','Cd','CN-','Pb']},
  rubber:{name:'橡塑料制品',rec:['苯','甲苯','二甲苯','乙苯','苯乙烯','邻苯二甲酸酯','Pb']},
  battery:{name:'电池制造',rec:['Pb','Cd','Ni','Co','Li','Hg','As']},
  smelt:{name:'黑色金属冶炼',rec:['As','Cd','Pb','Zn','Cu','Ni','Hg','CN-']},
  coking:{name:'炼焦',rec:['苯','甲苯','二甲苯','萘','苯并[a]芘','石油烃','As','Pb']},
  gas:{name:'燃气生产',rec:['苯','甲苯','二甲苯','乙苯','石油烃','萘']},
  waste:{name:'固废处置',rec:['As','Cd','Pb','Cu','Zn','Ni','Hg','二噁英']},
  mining:{name:'采矿选矿',rec:['As','Cd','Pb','Cu','Zn','Ni','Hg','CN-','F-']},
  other:{name:'其他',rec:['VOCs','SVOCs','重金属','石油烃']}
};

// Standard units for selection
const allUnits = [
  {id:'u1',name:'生产车间区域',desc:'涉及生产工艺过程的桶、槽、反应塔、管道等',level:2,icon:'🏭'},
  {id:'u2',name:'原料/产品储罐区',desc:'地上或地下储罐，含酸碱/有机溶剂/液氯等',level:1,icon:'🛢️'},
  {id:'u3',name:'污水处理站',desc:'废水处理构筑物、污水管线、污泥暂存',level:1,icon:'💧'},
  {id:'u4',name:'危废暂存间',desc:'危险废物临时储存、转运区域',level:2,icon:'⚠️'},
  {id:'u5',name:'装卸/包装区',desc:'原料卸料、产品包装、装卸作业区',level:2,icon:'📦'},
  {id:'u6',name:'化学品仓库',desc:'各类化学原辅料、试剂的储存仓库',level:2,icon:'🏪'},
  {id:'u7',name:'循环冷却水池',desc:'工业循环冷却水系统',level:2,icon:'🔄'},
  {id:'u8',name:'地下管线/管廊',desc:'地下工艺管线、物料输送管道',level:1,icon:'🔌'},
  {id:'u9',name:'固体废物堆场',desc:'一般工业固废暂存/堆存区域',level:2,icon:'🗑️'},
  {id:'u10',name:'废气处理设施',desc:'废气洗涤塔、除尘器、吸附装置等',level:2,icon:'💨'},
  {id:'u11',name:'地下储罐/池体',desc:'地下或半地下罐槽、池体等隐蔽设施',level:1,icon:'🕳️'},
  {id:'u12',name:'油品储罐区',desc:'重油/润滑油/液压油等储罐区',level:1,icon:'⛽'}
];

const baseItems = ['pH','As','Cd','Pb','Cr6+','Cu','Zn','Ni','Hg'];
let selUnits=[],selPol=[];

// ===== NAV =====
function goStep(n){
  if(n===0){showPanel(0);return}
  if(n===1&&!document.getElementById('industry').value){alert('请选择所属行业');return}
  if(n===2)generateDoc();
  showPanel(n);
}
function showPanel(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('ac'));
  document.getElementById('p'+n).classList.add('ac');
  document.querySelectorAll('.si').forEach(s=>s.classList.remove('ac'));
  document.getElementById('si'+n).classList.add('ac');
  for(let i=0;i<n;i++){document.getElementById('si'+i).classList.add('done');document.getElementById('si'+i).classList.remove('ac')}
  window.scrollTo({top:0,behavior:'smooth'});
  if(n===1)initUnits();
  if(n===0)updatePollutants();
}

// ===== UNITS =====
function initUnits(){
  let g=document.getElementById('unitGrid');
  if(g.children.length>0)return;
  g.innerHTML=allUnits.map(u=>`<div class="unit-card" onclick="toggleUnit(this,'${u.id}')"><div class="un">${u.icon} ${u.name}</div><div class="ud">${u.desc}</div><span class="ur">${u.level===1?'一级单元（隐蔽性设施）':'二级单元（其他重点区域）'}</span></div>`).join('');
  selUnits=allUnits.filter(u=>['u1','u2','u3','u4'].includes(u.id)).map(u=>u.id);
  selUnits.forEach(id=>{let el=g.querySelector(`[onclick*="'${id}'"]`);if(el)el.classList.add('ac')});
  updatePollutants();
}
function toggleUnit(el,id){
  el.classList.toggle('ac');
  let i=selUnits.indexOf(id);
  i>-1?selUnits.splice(i,1):selUnits.push(id);
}

function updatePollutants(){
  let ind=document.getElementById('industry').value;
  if(!ind){document.getElementById('pollutantTags').innerHTML='<span style="font-size:11px;color:var(--ink-light)">请先选择行业</span>';return}
  let d=indP[ind];selPol=[...d.rec];
  document.getElementById('pollutantTags').innerHTML=d.rec.map(p=>`<span class="tag ac" onclick="togglePol(this,'${p}')" style="padding:4px 10px;border-radius:5px;border:1px solid var(--sky);font-size:11px;cursor:pointer;background:var(--sky-light);color:var(--sky)">${p}</span>`).join('');
}
function togglePol(el,p){
  el.classList.toggle('ac');
  el.style.background=el.classList.contains('ac')?'var(--sky-light)':'#fff';
  el.style.color=el.classList.contains('ac')?'var(--sky)':'#94a3b8';
  let i=selPol.indexOf(p);i>-1?selPol.splice(i,1):selPol.push(p);
}

// ===== GENERATE DOCUMENT =====
function generateDoc(){
  let a=parseFloat(document.getElementById('area').value)||5000,lt=document.getElementById('landType').value,md=document.getElementById('media').value;
  let ind=document.getElementById('industry').value,data=indP[ind]||{name:'其他',rec:[]};
  let un=selUnits.map(id=>allUnits.find(u=>u.id===id)).filter(Boolean);
  let l1=un.filter(u=>u.level===1),l2=un.filter(u=>u.level===2);
  let sp=Math.max(3,Math.ceil(a/1600));if(lt==='agriculture')sp=Math.max(3,Math.floor(a/2000));
  let gp=md==='gw'||md==='both'?Math.max(3,Math.ceil(a/2000)):0;
  
  let allPol=[...new Set([...baseItems,...selPol])];
  let metal=allPol.filter(p=>['As','Cd','Pb','Cr6+','Cu','Zn','Ni','Hg','Cr','Sb','Be','Co','Se','V'].includes(p));
  let voc=allPol.filter(p=>['VOCs(27项)','苯','甲苯','二甲苯','乙苯','氯仿','四氯化碳','苯乙烯','丙酮','三氯乙烯','VOCs'].includes(p));
  let svoc=allPol.filter(p=>['SVOCs(11项)','萘','苯并[a]芘','苯酚','邻苯二甲酸酯','硝基苯','苯胺','SVOCs'].includes(p));
  let other=allPol.filter(p=>!metal.includes(p)&&!voc.includes(p)&&!svoc.includes(p));

  let tableRows='';
  let cats=[{name:'重金属',items:metal},{name:'挥发性有机物（VOCs）',items:voc},{name:'半挥发性有机物（SVOCs）',items:svoc},{name:'其他',items:other}];

<h4>7.1 采样前准备</h4>
<div class="doc-ref">
现场定位：采用GPS定位，记录经纬度及高程。<br>
采样工具：VOCs样品使用非扰动采样器；重金属/SVOCs使用竹刀、不锈钢药匙。<br>
保存设备：40mL吹扫捕集瓶（VOCs）、250mL棕色广口玻璃瓶（SVOCs）、自封袋（重金属）。<br>
冷藏运输：车载冰箱4℃以下保存，48h内送达实验室。
</div>
<h4>7.2 土壤样品采集</h4>
<div class="doc-ref">
（1）优先采集VOCs样品，岩芯取出后立即用非扰动取样器采集，推入40mL吹扫瓶，每样品3瓶。<br>
（2）然后采集SVOCs样品（250mL棕色瓶）和重金属样品（自封袋）。<br>
（3）采样过程防止交叉污染：每点位更换手套，每样品清洗/更换采样工具。<br>
（4）现场平行样：每10个样品不少于1个。
</div>
<h4>7.3 样品流转</h4>
<div class="doc-ref">
样品采集后当天送达实验室。送样者与接样者双方核对样品编号、数量、状态，在样品交接单上签字确认。样品4℃以下冷藏保存，无机样保留半年，有机样保留2年。
