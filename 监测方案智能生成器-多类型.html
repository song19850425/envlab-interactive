<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>监测方案智能生成器 多类型版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif+SC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f172a;--ink-light:#475569;--paper:#f8fafc;--sky:#0284c7;--sky-light:#e0f2fe;--teal:#0d9488;--teal-light:#ccfbf1;--amber:#b45309;--amber-light:#fef3c7;--rose:#e11d48;--rose-light:#ffe4e6;--violet:#7c3aed;--violet-light:#ede9fe;--border:#e2e8f0;--serif:'Noto Serif SC',serif;--sans:'Inter','PingFang SC','Microsoft YaHei',sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink)}#sp{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--sky),var(--teal),var(--violet));z-index:1000;transition:width .1s}
.app{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 20px}header h1{font-family:var(--serif);font-size:clamp(24px,4vw,36px);font-weight:900}header h1 em{font-style:normal;color:var(--sky)}header p{color:var(--ink-light);font-size:13px;margin-top:6px}
.steps{display:flex;justify-content:center;gap:4px;max-width:800px;margin:12px auto}
.si{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:11px;font-weight:600;color:#94a3b8}
.si .sn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#e2e8f0;color:#94a3b8;font-weight:700;font-size:11px;transition:.3s}
.si.ac .sn{background:var(--sky);color:#fff}.si.done .sn{background:var(--teal);color:#fff}.si.ac{color:var(--sky)}.si.done{color:var(--teal)}
.panel{display:none;background:#fff;border-radius:14px;border:1px solid var(--border);padding:24px;margin-top:12px}
.panel.ac{display:block}
h2.st{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
h3.sub{font-size:13px;font-weight:600;margin:14px 0 8px;color:var(--ink)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ink-light);margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--sans);background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.form-full{grid-column:1/-1}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.btn{padding:10px 22px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.3s}
.btn-pri{background:linear-gradient(135deg,var(--sky),#0369a1);color:#fff}
.btn-pri:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(2,132,199,.25)}
.btn-sec{background:#f1f5f9;color:var(--ink);border:1px solid var(--border)}
.btn-sec:hover{background:#e2e8f0}
.btn-suc{background:linear-gradient(135deg,var(--teal),#0f766e);color:#fff}
.btn-suc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.25)}
/* TYPE SELECTOR */
.ts{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:16px 0}
.tc{border:2px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:.25s;background:#fff}
.tc:hover{border-color:var(--sky);transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.06)}
.tc.ac{border-color:var(--sky);background:var(--sky-light);box-shadow:0 6px 16px rgba(2,132,199,.1)}
.tc .ti{font-size:28px;display:block;margin-bottom:6px}.tc .tn{font-weight:700;font-size:13px;display:block}.tc .td{font-size:11px;color:var(--ink-light);margin-top:2px}
/* UNIT CARDS */
.ug{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.uc{border:1.5px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:.2s}.uc:hover{border-color:var(--sky);background:var(--sky-light)}.uc.ac{border-color:var(--sky);background:var(--sky-light)}
.uc .un{font-weight:600;font-size:12px;margin-bottom:2px}.uc .ud{font-size:10px;color:var(--ink-light)}.uc .ur{display:inline-block;margin-top:3px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;background:#f1f5f9}
/* TAG */
.tag{display:inline-block;padding:4px 10px;border-radius:5px;border:1px solid var(--border);font-size:11px;cursor:pointer;background:#fff;margin:3px;transition:.15s}
.tag:hover{border-color:var(--sky)}.tag.ac{background:var(--sky-light);border-color:var(--sky);color:var(--sky)}
/* DOC */
.doc-toc{background:#f8fafc;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;line-height:2.2}
.doc-toc strong{font-size:12px}.doc-toc span{cursor:pointer;color:var(--sky);margin-right:10px;font-size:10px}.doc-toc span:hover{text-decoration:underline}
.doc-section{margin-bottom:20px;page-break-inside:avoid}
.doc-section h3{font-size:14px;font-weight:700;margin-bottom:6px;padding-bottom:5px;border-bottom:2px solid var(--sky-light)}
.doc-section h4{font-size:12px;font-weight:600;margin:8px 0 4px}
.doc-section p,.doc-section li{font-size:11px;line-height:1.8;color:var(--ink-light)}
.doc-section table.dt{width:100%;border-collapse:collapse;font-size:10px;margin:6px 0}
.doc-section table.dt th{background:#f1f5f9;padding:4px 5px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);font-size:9px}
.doc-section table.dt td{padding:3px 5px;border-bottom:1px solid var(--border)}
.doc-ref{background:#f8fafc;border-radius:6px;padding:8px 10px;font-size:10px;line-height:1.7;margin:4px 0}
.hidden-s{display:none}
@media(max-width:700px){.form-grid,.ug{grid-template-columns:1fr}.ts{grid-template-columns:1fr 1fr}.panel{padding:16px}}
</style></head><body>
<div id="sp"></div>
<div class="app">
<header><h1>监测方案<em>智能生成器</em></h1><p>覆盖土壤/噪声/废水/废气四类方案，基于真实方案模板构建</p></header>
<div class="steps"><div class="si ac" id="s0"><span class="sn">1</span><span>方案类型</span></div><div class="si" id="s1"><span class="sn">2</span><span>参数填写</span></div><div class="si" id="s2"><span class="sn">3</span><span>生成方案</span></div></div>

<div class="panel ac" id="p0">
<h2 class="st">选择方案类型</h2>
<div class="ts" id="typeGrid">
<div class="tc ac" onclick="selType(0)"><span class="ti">🌱</span><span class="tn">土壤/地下水</span><span class="td">自行监测 · HJ 1209-2021</span></div>
<div class="tc" onclick="selType(1)"><span class="ti">🎵</span><span class="tn">噪声/振动</span><span class="td">厂界/敏感点 · GB 12348/GB 10071</span></div>
<div class="tc" onclick="selType(2)"><span class="ti">💧</span><span class="tn">废水</span><span class="td">排放口监测 · GB 8978/GB 18466</span></div>
<div class="tc" onclick="selType(3)"><span class="ti">💨</span><span class="tn">废气</span><span class="td">有组织/无组织 · GB 16297</span></div>
</div>
<div class="btn-row"><button class="btn btn-pri" onclick="go(1)">下一步 →</button></div>
</div>

<div class="panel" id="p1">
<div id="formSoil" class="hidden-s">
<h2 class="st">🌱 土壤/地下水 项目信息</h2>
<div class="form-grid">
<div class="form-group"><label>项目名称</label><input id="sProj" value="某地块土壤污染状况调查"></div>
<div class="form-group"><label>地块面积 (m²)</label><input id="sArea" type="number" value="5000"></div>
<div class="form-group"><label>地块类型</label><select id="sLand"><option value="c">建设用地</option><option value="a">农用地</option></select></div>
<div class="form-group"><label>规划用途</label><select id="sUse"><option value="1">第一类用地</option><option value="2">第二类用地</option></select></div>
<div class="form-group"><label>所属行业</label><select id="sInd" onchange="upPol()"><option value="chemical">化工</option><option value="petro">石油加工</option><option value="metal">有色金属冶炼</option><option value="electro">电子设备</option><option value="plating">电镀</option><option value="other">其他</option></select></div>
<div class="form-group"><label>关注介质</label><select id="sMed"><option value="both">土壤+地下水</option><option value="soil">仅土壤</option></select></div>
<div class="form-group"><label>地下水埋深</label><input id="sGwd" value="20~60m"></div>
<div class="form-group"><label>地下水流向</label><input id="sGwf" value="西北→东南"></div>
</div>
<div><label style="font-size:11px;font-weight:600;color:var(--ink-light)">特征污染物：</label><div id="sPols"></div></div>
<div class="ug" id="sUnits"></div>
</div>

<div id="formNoise" class="hidden-s">
<h2 class="st">🎵 噪声/振动 项目信息</h2>
<div class="form-grid">
<div class="form-group"><label>项目名称</label><input id="nProj" value="XX轨道交通工程噪声监测"></div>
<div class="form-group"><label>敏感点数量</label><input id="nSites" type="number" value="117"></div>
<div class="form-group"><label>测点总数</label><input id="nPoints" type="number" value="144"></div>
<div class="form-group"><label>监测天数</label><input id="nDays" type="number" value="2"></div>
<div class="form-group"><label>监测类型</label><select id="nType"><option value="both">噪声+振动</option><option value="noise">仅噪声</option><option value="vibration">仅振动</option></select></div>
<div class="form-group"><label>执行标准</label><select id="nStd">
<option value="GB3096-2008+GB10071-88">GB 3096-2008 + GB 10071-88</option>
<option value="GB12348-2008">GB 12348-2008 厂界噪声</option>
<option value="GB3096-2008">GB 3096-2008 声环境质量</option>
</select></div>
</div>
<div class="form-grid">
<div class="form-group form-full"><label>振动监测因子</label><input id="nVibFact" value="VLzmax（有车时）/ VLz10（无车时）"></div>
<div class="form-group form-full"><label>噪声监测因子</label><input id="nNoiFact" value="等效连续A声级 Leq"></div>
</div>
<div class="form-grid"><div class="form-group"><label>昼间标准值 dB(A)</label><input id="nDay" value="70"></div>
<div class="form-group"><label>夜间标准值 dB(A)</label><input id="nNight" value="55"></div></div>
<div class="form-grid"><div class="form-group"><label>敏感点类型</label><textarea id="nSens" rows="2">住宅小区、学校、医院等噪声敏感建筑物</textarea></div>
<div class="form-group"><label>减振措施</label><textarea id="nDamp" rows="2">钢弹簧浮置板道床、双轨扣件、浮轨扣件</textarea></div></div>
</div>

<div id="formWastewater" class="hidden-s">
<h2 class="st">💧 废水监测 项目信息</h2>
<div class="form-grid">
<div class="form-group"><label>项目名称</label><input id="wProj" value="XX医院废水监测"></div>
<div class="form-group"><label>排放口数量</label><input id="wOut" type="number" value="1"></div>
<div class="form-group"><label>行业类型</label><select id="wInd"><option value="hospital">医疗机构</option><option value="chemical">化工</option><option value="electro">电子</option><option value="food">食品加工</option><option value="municipal">城镇污水处理</option></select></div>
<div class="form-group"><label>监测天数</label><input id="wDays" type="number" value="2"></div>
<div class="form-group"><label>日均采样次数</label><input id="wFreq" type="number" value="4"></div>
<div class="form-group"><label>执行标准</label><select id="wStd">
<option value="GB18466-2005">GB 18466-2005 医疗机构</option>
<option value="GB8978-1996">GB 8978-1996 污水综合排放</option>
<option value="GB18918-2002">GB 18918-2002 城镇污水处理厂</option>
</select></div>
</div>
<div class="form-grid">
<div class="form-group form-full"><label>监测因子（逗号分隔）</label><textarea id="wFact" rows="2">pH, CODcr, BOD₅, SS, NH₃-N, TP, 动植物油, 阴离子表面活性剂, 粪大肠菌群, 总余氯</textarea></div></div>
<div class="form-grid"><div class="form-group"><label>废水处理工艺</label><textarea id="wProc" rows="2">格栅+调节池+A²O一体化处理设备+消毒</textarea></div>
<div class="form-group"><label>排放去向</label><textarea id="wDest" rows="2">进入城镇污水处理厂（间接排放）</textarea></div></div>
</div>

<div id="formExhaust" class="hidden-s">
<h2 class="st">💨 废气监测 项目信息</h2>
<div class="form-grid">
<div class="form-group"><label>项目名称</label><input id="eProj" value="XX企业废气监测"></div>
<div class="form-group"><label>排放口数量</label><input id="eOut" type="number" value="2"></div>
<div class="form-group"><label>行业类型</label><select id="eInd"><option value="hospital">医疗机构</option><option value="chemical">化工</option><option value="coating">涂装/印刷</option><option value="boiler">锅炉</option><option value="power">电力/热力</option></select></div>
<div class="form-group"><label>监测天数</label><input id="eDays" type="number" value="2"></div>
<div class="form-group"><label>监测类型</label><select id="eType"><option value="both">有组织+无组织</option><option value="org">仅有组织</option><option value="unorg">仅无组织</option></select></div>
<div class="form-group"><label>执行标准</label><select id="eStd">
<option value="GB16297-1996">GB 16297-1996 大气污染物综合排放</option>
<option value="GB13271-2014">GB 13271-2014 锅炉大气污染物</option>
<option value="GB18466-2005">GB 18466-2005 医疗机构废气</option>
</select></div>
</div>
<div class="form-grid">
<div class="form-group form-full"><label>监测因子（逗号分隔）</label><textarea id="eFact" rows="2">颗粒物, SO₂, NOₓ, 氯化氢, 氯气, 非甲烷总烃, 臭气浓度</textarea></div></div>
<div class="form-grid"><div class="form-group"><label>废气治理设施</label><textarea id="eTmt" rows="2">布袋除尘器+碱液喷淋塔+活性炭吸附</textarea></div>
<div class="form-group"><label>排气筒参数</label><textarea id="eStack" rows="2">高度15m×2座，内径0.8m，烟气温度60℃</textarea></div></div>
</div>

<div class="btn-row"><button class="btn btn-sec" onclick="go(0)">← 返回</button><button class="btn btn-pri" onclick="go(2)">生成方案 →</button></div>
</div>

<div class="panel" id="p2">
<div class="btn-row" style="margin-bottom:12px"><button class="btn btn-suc" onclick="window.print()">🖨️ 打印/导出PDF</button><button class="btn btn-sec" onclick="go(1)">← 修改</button></div>
<div class="result-doc" id="docContent"></div>
</div>

<footer style="text-align:center;padding:30px;color:var(--ink-light);font-size:11px;border-top:1px solid var(--border);margin-top:30px">环境检测 · 交互式教学 | jinghao.song@gmail.com</footer></div>

<script>
let currType=0;
function selType(n){currType=n;document.querySelectorAll('.tc').forEach((t,i)=>t.classList.toggle('ac',i===n))}
function go(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('ac'));
  document.getElementById('p'+n).classList.add('ac');
  document.querySelectorAll('.si').forEach(s=>s.classList.remove('ac'));
  document.getElementById('s'+n).classList.add('ac');
  for(let i=0;i<n;i++){document.getElementById('s'+i).classList.add('done');document.getElementById('s'+i).classList.remove('ac')}
  if(n===1)initForm();
  if(n===2)genDoc();
  window.scrollTo({top:0,behavior:'smooth'});
}
function initForm(){
  ['formSoil','formNoise','formWastewater','formExhaust'].forEach((id,i)=>document.getElementById(id).classList.toggle('hidden-s',i!==currType));
  if(currType===0){initSoilForms()}
}

// ===== SOIL =====
const allUnits=[{id:'u1',n:'生产车间区域',d:'反应塔、槽、管道等',lv:2},{id:'u2',n:'原料/产品储罐区',d:'地上/地下储罐，含酸碱/有机溶剂',lv:1},{id:'u3',n:'污水处理站',d:'废水处理构筑物、污泥暂存',lv:1},{id:'u4',n:'危废暂存间',d:'危险废物临时储存',lv:2},{id:'u5',n:'装卸/包装区',d:'原料卸料、产品包装',lv:2},{id:'u6',n:'化学品仓库',d:'原辅料储存仓库',lv:2},{id:'u7',n:'地下管线/管廊',d:'地下工艺管线',lv:1},{id:'u8',n:'油品储罐区',d:'重油/润滑油储罐',lv:1}];
const indP={chemical:{n:'化工',r:['苯','甲苯','二甲苯','氯仿','As','Hg']},petro:{n:'石油',r:['石油烃(C10-C40)','苯','甲苯','萘']},metal:{n:'有色冶金',r:['As','Cd','Pb','Cu','Zn','Hg','Ni']},electro:{n:'电子',r:['丙酮','苯','甲苯','三氯乙烯','Pb']},plating:{n:'电镀',r:['Cr6+','Ni','Cu','Zn','Cd','CN-']},other:{n:'其他',r:['VOCs','SVOCs','重金属','石油烃']}};
let selU=[],selP=[];
function initSoilForms(){
  let g=document.getElementById('sUnits');
  if(g.children.length>0)return;
  g.innerHTML=allUnits.map(u=>`<div class="uc" onclick="tU(this,'${u.id}')"><div class="un">${u.n}</div><div class="ud">${u.d}</div><span class="ur">${u.lv===1?'一级':'二级'}单元</span></div>`).join('');
  ['u1','u2','u3','u4'].forEach(id=>{let e=g.querySelector(`[onclick*="'${id}'"]`);if(e)e.classList.add('ac');selU.push(id)});
  upPol();
}
function tU(e,i){e.classList.toggle('ac');let x=selU.indexOf(i);x>-1?selU.splice(x,1):selU.push(i)}
function upPol(){let d=indP[document.getElementById('sInd').value]||indP.other;selP=[...d.r];
  document.getElementById('sPols').innerHTML=d.r.map(p=>`<span class="tag ac" onclick="tP(this,'${p}')">${p}</span>`).join('')}
function tP(e,p){e.classList.toggle('ac');e.classList.contains('ac')?selP.includes(p)||selP.push(p):selP=selP.filter(x=>x!==p)}

// ===== GENERATE =====
function genDoc(){
  let html='';
  if(currType===0)html=genSoil();
  else if(currType===1)html=genNoise();
  else if(currType===2)html=genWater();
  else if(currType===3)html=genExhaust();
  document.getElementById('docContent').innerHTML=html;
}
function genSoil(){
  let a=parseFloat(document.getElementById('sArea').value)||5000;
  let sp=Math.max(3,Math.ceil(a/1600));
  let md=document.getElementById('sMed').value,gp=md==='both'?Math.max(3,Math.ceil(a/2000)):0;
  let l1=selU.filter(id=>allUnits.find(u=>u.id===id)?.lv===1).length;
  let l2=selU.filter(id=>allUnits.find(u=>u.id===id)?.lv===2).length;
  let items=['pH','As','Cd','Pb','Cr6+','Cu','Zn','Ni','Hg',...selP,'石油烃(C10-C40)','氟化物'];
  return `<div class="doc-toc"><strong>目录：</strong><span onclick="s2('ds1')">1.项目背景</span><span onclick="s2('ds2')">2.企业概况</span><span onclick="s2('ds3')">3.区域环境</span><span onclick="s2('ds4')">4.重点区域识别</span><span onclick="s2('ds5')">5.监测方案</span><span onclick="s2('ds6')">6.分析方法</span><span onclick="s2('ds7')">7.采样与保存</span><span onclick="s2('ds8')">8.质控</span></div>
<div class="doc-section"><h3 id="ds1">1 项目背景</h3><p>为贯彻落实《土壤污染防治法》，按照HJ 1209-2021等要求，某某公司于2026年委托我方开展土壤及地下水自行监测工作。</p>
<h4>工作依据</h4><div class="doc-ref">• HJ 1209-2021 工业企业土壤和地下水自行监测技术指南<br>• HJ 25.1-2019 建设用地土壤污染状况调查技术导则<br>• HJ 25.2-2019 建设用地土壤污染风险管控和修复监测技术导则<br>• HJ/T 166-2004 土壤环境监测技术规范<br>• HJ 164-2020 地下水环境监测技术规范<br>• GB 36600-2018 土壤环境质量 建设用地土壤污染风险管控标准<br>• GB/T 14848-2017 地下水质量标准</div></div>
<div class="doc-section"><h3 id="ds2">2 企业概况</h3><p>某某公司位于某某省，地块面积约${a}m²。主要从事相关生产。</p></div>
<div class="doc-section"><h3 id="ds3">3 区域环境概况</h3><p>调查区位于冲洪积平原地貌单元。地下水埋深${document.getElementById('sGwd').value}，流向${document.getElementById('sGwf').value}。浅层地下水为松散岩类孔隙水。</p></div>
<div class="doc-section"><h3 id="ds4">4 重点区域识别</h3><p>识别出${l1+l2}个重点监测单元：一级${l1}个、二级${l2}个。</p><div class="doc-ref">${selU.map(id=>{let u=allUnits.find(x=>x.id===id);return u?'• '+u.n+'（'+(u.lv===1?'一级单元：隐蔽性设施':'二级单元：其他重点区域')+'）':''}).filter(Boolean).join('<br>')}</div></div>
<div class="doc-section"><h3 id="ds5">5 监测方案</h3><p>布设土壤监测点${sp}个，${gp>0?'地下水监测井'+gp+'个':'因地下水位较深，本次不设地下水监测井'}。采样深度：表层0~0.5m${l1>0?'，深层略低于隐蔽设施底部':''}。</p><p>监测频次：表层土壤1次/年${l1>0?'，深层土壤1次/3年':''}。</p><p>检测指标：GB 36600表1基本项目+pH+特征污染物（${selP.join('、')}），执行${document.getElementById('sUse').value==='1'?'第一类':'第二类'}用地筛选值。</p></div>
<div class="doc-section"><h3 id="ds6">6 检测分析方法</h3><table class="dt"><thead><tr><th>项目</th><th>分析方法</th><th>标准编号</th></tr></thead><tbody>
<tr><td>pH</td><td>电极法</td><td>HJ 962-2018</td></tr><tr><td>As</td><td>原子荧光法</td><td>GB/T 22105.2-2008</td></tr><tr><td>Cd/Pb</td><td>石墨炉原子吸收法</td><td>GB/T 17141-1997</td></tr><tr><td>Cu/Zn/Ni/Cr</td><td>火焰原子吸收法</td><td>HJ 491-2019</td></tr><tr><td>Hg</td><td>原子荧光法</td><td>GB/T 22105.1-2008</td></tr><tr><td>Cr6+</td><td>二苯碳酰二肼分光光度法</td><td>HJ 1082-2019</td></tr><tr><td>VOCs</td><td>吹扫捕集-GC-MS</td><td>HJ 605-2011</td></tr><tr><td>SVOCs</td><td>GC-MS</td><td>HJ 834-2017</td></tr><tr><td>石油烃C10-C40</td><td>气相色谱法</td><td>HJ 1021-2019</td></tr></tbody></table></div>
<div class="doc-section"><h3 id="ds7">7 样品采集与保存</h3><div class="doc-ref">VOCs样品用非扰动采样器采集至40mL吹扫瓶；SVOCs用250mL棕色玻璃瓶；重金属用自封袋。4℃冷藏，48h内送达实验室。每10个样品设1个平行样。</div></div>
<div class="doc-section"><h3 id="ds8">8 质量保证与控制</h3><div class="doc-ref">现场：平行样/运输空白/全程序空白。实验室：空白/平行/加标回收/质控样。三级审核制度。执行HJ/T 166-2004。</div></div>`;
}

  return `<div class="doc-toc"><strong>目录：</strong><span onclick="s2('n1')">1.项目概况</span><span onclick="s2('n2')">2.监测依据</span><span onclick="s2('n3')">3.监测内容</span><span onclick="s2('n4')">4.监测点位</span><span onclick="s2('n5')">5.分析方法</span><span onclick="s2('n6')">6.质控措施</span></div>
<div class="doc-section"><h3 id="n1">1 项目概况</h3><p>${p}，沿线布设${sites}处敏感点、共${pts}个监测点位。执行标准：${std}。</p></div>
<div class="doc-section"><h3 id="n2">2 监测依据</h3><div class="doc-ref">• ${std}<br>• HJ/T 403-2007 城市轨道交通竣工环保验收技术规范<br>•  HJ 2.4-2021 环境影响评价技术导则 声环境</div></div>

<div class="doc-section"><h3 id="n4">4 监测点位</h3><div class="doc-ref">敏感点类型：${document.getElementById('nSens').value||'住宅小区、学校等'}<br>减振措施：${document.getElementById('nDamp').value||'钢弹簧浮置板道床'}<br>标准限值：昼间${day}dB(A) / 夜间${night}dB(A)</div></div>
<div class="doc-section"><h3 id="n5">5 分析方法</h3><table class="dt"><thead><tr><th>项目</th><th>方法</th><th>标准</th></tr></thead><tbody><tr><td>等效连续A声级</td><td>声级计法</td><td>GB 3096-2008</td></tr><tr><td>振动级VLz</td><td>振动计法</td><td>GB 10071-88</td></tr></tbody></table></div>
<div class="doc-section"><h3 id="n6">6 质量控制</h3><div class="doc-ref">声级计测量前后现场声学校准，偏差≤0.5dB。同步监测背景噪声。记录主要振源、列车编组、轨道条件、气象条件（风速<5m/s、无雨雪）。</div></div>`;
}
