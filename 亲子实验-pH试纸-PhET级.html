<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pH试纸测遍全家的水 · 亲子科学实验室</title>
<style>
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;
  --accent:#0ea5e9;--accent2:#f472b6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.5;overflow-x:hidden}
.hero{position:relative;padding:36px 24px 28px;text-align:center;background:linear-gradient(135deg,#0f172a,#1e1b4b);overflow:hidden;margin-bottom:16px}
.hero::before{content:'';position:absolute;top:-60%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(244,114,182,.06) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(14,165,233,.04) 0%,transparent 40%);pointer-events:none}
.hero h1{font-size:22px;position:relative;z-index:1;font-weight:700}
.hero h1 em{color:var(--accent2);font-style:normal}
.hero .hb{font-size:11px;color:var(--muted);margin-top:4px;position:relative;z-index:1}
.lab{max-width:780px;margin:0 auto;padding:0 12px 40px}
.lab .hdr{display:flex;justify-content:space-between;align-items:center;margin:10px 0 14px}
.lab .hdr .hgl{font-size:13px;color:var(--accent2);font-weight:600;background:rgba(244,114,182,.08);padding:4px 14px;border-radius:20px;border:1px solid rgba(244,114,182,.15)}
.lab .hdr .hst span{color:var(--muted);font-size:11px;margin-left:10px}
.lab .hdr .hst em{color:var(--text);font-style:normal;font-weight:600}
/* 主区 */
.main{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.main{grid-template-columns:1fr}}
/* 试管架 */
.rack{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative}
.rack .rt{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--accent2);display:flex;justify-content:space-between}
.rack .rt .rtip{font-size:10px;color:var(--muted);font-weight:400}
.samples{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sample{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px;position:relative}
.sample:hover{border-color:rgba(244,114,182,.3)}
.sample.active{border-color:var(--accent2);box-shadow:0 0 12px rgba(244,114,182,.15)}
.sample .sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.sample .sname{font-size:11px;flex:1}
.sample .sval{font-size:10px;color:var(--muted);font-weight:600}
.sample .sbadge{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600}
.sample .sbadge.a{background:rgba(239,68,68,.15);color:var(--red)}
.sample .sbadge.n{background:rgba(34,197,55,.15);color:var(--green)}
.sample .sbadge.b{background:rgba(14,165,233,.15);color:var(--accent)}
/* 实验区 */
.exp{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column}
.exp .et{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:10px;text-align:center}
.exp .strip-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:180px}
.strip-wrap{position:relative;width:100px;height:200px;margin:0 auto}
.strip-bg{width:50px;height:160px;background:#f0f0e8;border-radius:4px;margin:0 auto;position:relative;overflow:hidden;border:2px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.strip-pad{position:absolute;bottom:10px;left:6px;width:38px;height:30px;border-radius:3px;transition:background 1s ease}
.strip-label{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:7px;color:#999;line-height:1.2;padding:0 2px}
.strip-handle{width:100px;height:18px;background:#8B7355;border-radius:3px;margin:0 auto 4px;border:1px solid #6b5b3e;position:relative}
.strip-handle::after{content:'▼';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(255,255,255,.3)}
/* 比色卡 */
.chart{display:flex;justify-content:center;gap:1px;margin:8px 0 4px}
.chart .citem{width:20px;height:40px;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:rgba(0,0,0,.7)}
.chart .citem .cv{font-size:7px}
/* 结果 */
.result{text-align:center;padding:8px;border-radius:8px;margin-top:6px;font-size:13px;font-weight:600}
.result.unknown{background:rgba(100,116,139,.1);color:var(--muted)}
.result.done{animation:pop .3s}
@keyframes pop{0%{transform:scale(.95)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.result .rsub{font-size:11px;font-weight:400;color:var(--muted);margin-top:2px}
.result .remoji{font-size:24px;margin-bottom:2px}
/* 动作 */
.acts{display:flex;gap:8px;justify-content:center;margin-top:8px}
.acts button{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:12px;cursor:pointer;transition:.2s}
.acts button:hover{background:rgba(244,114,182,.1);border-color:var(--accent2)}
.acts button.primary{background:rgba(244,114,182,.15);border-color:var(--accent2);color:var(--accent2)}
.acts button.primary:hover{background:rgba(244,114,182,.25)}
/* 信息区 */
.info-bar{display:flex;gap:8px;margin-top:12px;padding:8px 12px;background:var(--card2);border-radius:8px;border:1px solid var(--border);font-size:11px;color:var(--muted);align-items:center;flex-wrap:wrap}
.info-bar .ib{display:flex;align-items:center;gap:4px}
.info-bar .ib .ibl{color:var(--muted)}
.info-bar .ib .ibv{color:var(--text);font-weight:600}
.ft{text-align:center;padding:24px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:16px}
.ft em{color:var(--accent2);font-style:normal}
</style>
</head>
<body>

<div class="hero">
  <h1>🧪 用pH试纸<em>测遍全家的水</em></h1>
  <div class="hb">EnvLab · 亲子科学实验室 · 点击水样→浸入试纸→看颜色变化</div>
</div>

<div class="lab">
  <div class="hdr">
    <div class="hgl">🎯 点击任意水样开始实验</div>
    <div class="hst">已测 <em id="dCount">0</em> 种 <span>| 比色卡 pH 0-14</span></div>
  </div>

  <div class="main">
    <!-- 试管架 -->
    <div class="rack">
      <div class="rt">🧴 家里的液体 <span class="rtip">从弱到强排好了→点击再浸入试纸</span></div>
      <div class="samples" id="samples"></div>
    </div>

    <!-- 实验区 -->
    <div class="exp">
      <div class="et">🔬 试纸检测</div>
      <div class="strip-area" id="stripArea">
        <div class="strip-wrap" id="stripWrap" style="cursor:pointer">
          <div class="strip-handle"></div>
          <div class="strip-bg">
            <div class="strip-label">pH<br>试纸</div>
            <div class="strip-pad" id="stripPad" style="background:#f0f0e8"></div>
          </div>
        </div>
        <!-- 比色卡 -->
        <div class="chart" id="chart"></div>
        <div class="result unknown" id="result">👆 先选一种水样，再点试纸浸入</div>
        <div class="acts">
          <button class="primary" id="btnDip">🧫 浸入试纸</button>
          <button id="btnReset">🔄 重置</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 信息栏 -->
  <div class="info-bar">
    <span class="ib"><span class="ibl">🧪 当前水样：</span><span class="ibv" id="iCurrent">未选择</span></span>
    <span class="ib"><span class="ibl" id="iPHLabel">pH</span><span class="ibv" id="iPH">--</span></span>
    <span class="ib"><span class="ibl">分类：</span><span class="ibv" id="iType">--</span></span>
  </div>
</div>

<div class="ft">🧪 在家也能做！买一盒pH试纸(约¥15)，测遍你家的各种液体吧！<br>⚠️ 洁厕灵和84消毒液有腐蚀性，必须在爸爸妈妈陪同下操作！<br>EnvLab · <em>亲子科学实验室</em> · 和小宋一起玩科学</div>

<script>
// pH colors 0-14
const pHColors=[
  '#ed1b24','#f15a24','#f7931e','#fbb03b','#ffe066','#c3d7a4','#8dc73f',
  '#39b54a','#00a651','#009245','#0072bc','#0054a5','#2b3990','#662d91','#92278f'
];
const pHNames=['强酸性','强酸性','酸性','弱酸性','弱酸性','微酸','近中性','中性','近中性','微碱','弱碱性','碱性','强碱性','强碱性','强碱性'];
const pHEmojis=['💀','💀','😱','😰','😐','🙂','😊','😊','😊','🙂','😐','😰','😱','💀','💀'];
const pHDescs=[
  '洁厕灵级别！腐蚀性极强⚠️','洁厕灵级别','柠檬汁/维C级别','醋·可乐级别','柠檬水/酸菜级别','纯水/牛奶','干净雨水','健康饮用水',
  '饮用水/茶水','鸡蛋清级别','牙膏/小苏打','洗衣粉级别！','肥皂水级别⚠️','84消毒液级别！强腐蚀⚠️','管道疏通剂级别！危险⚠️'
];

// Water samples — 10 everyday household items spanning pH 1.5 ~ 12.0
const samples=[
  {id:'wc',   name:'🚽 洁厕灵', pH:1.5, cat:'强酸性'},
  {id:'lemon',name:'🍋 柠檬汁', pH:2.2, cat:'强酸性'},
  {id:'vinegar',name:'🫗 白醋',   pH:2.5, cat:'酸性'},
  {id:'cola', name:'🥤 可乐',   pH:2.6, cat:'酸性'},
  {id:'tap',  name:'🚰 自来水', pH:7.2, cat:'中性'},
  {id:'soda', name:'🥤 苏打水', pH:8.5, cat:'弱碱性'},
  {id:'tooth',name:'🪥 牙膏水', pH:9.0, cat:'碱性'},
  {id:'soap', name:'🧼 肥皂水', pH:9.5, cat:'碱性'},
  {id:'laundry',name:'👕 洗衣粉水',pH:10.5,cat:'强碱性'},
  {id:'bleach',name:'🧴 84消毒液',pH:12.0,cat:'强碱性'}
];

let selected=null;
let testedCount=0;
let testedSet=new Set();
let dipped=false;

// Render chart
const chartEl=document.getElementById('chart');
pHColors.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='citem';
  d.style.background=c;
  d.innerHTML=`<span class="cv">${i}</span>`;
  chartEl.appendChild(d);
});

// Render samples
const samplesEl=document.getElementById('samples');
samples.forEach(s=>{
  const d=document.createElement('div');
  d.className='sample';
  d.dataset.id=s.id;
  const color=pHColors[Math.round(s.pH)];
  d.innerHTML=`
    <div class="sdot" style="background:${color}"></div>
    <span class="sname">${s.name}</span>
    <span class="sval">pH ${s.pH}</span>
  `;
  d.addEventListener('click',()=>selectSample(s.id));
  samplesEl.appendChild(d);
});

function selectSample(id){
  selected=id;
  dipped=false;
  document.querySelectorAll('.sample').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.sample[data-id="${id}"]`).classList.add('active');
  const s=samples.find(x=>x.id===id);
  document.getElementById('iCurrent').textContent=s.name;
  document.getElementById('iPH').textContent='--';
  document.getElementById('iPHLabel').textContent='pH';
  document.getElementById('iType').textContent='--';
  document.getElementById('result').className='result unknown';
  document.getElementById('result').innerHTML='🧫 点击「浸入试纸」看颜色变化';
  document.getElementById('stripPad').style.background='#f0f0e8';
}

function getMeasuredPH(base){
  // 每次检测在小数点后两位小幅波动：±0.04，保留2位小数
  const offset=(Math.random()-0.5)*0.08;
  return parseFloat((base+offset).toFixed(2));
}

function dipStrip(){
  if(!selected){
    document.getElementById('result').className='result unknown';
    document.getElementById('result').innerHTML='⚠️ 先在左边选一种水样！';
    return;
  }
  const s=samples.find(x=>x.id===selected);
  if(!s)return;
  dipped=true;
  const measured=getMeasuredPH(s.pH);
  const idx=Math.min(14,Math.max(0,Math.round(measured)));
  const color=pHColors[idx];
  const pad=document.getElementById('stripPad');
  pad.style.transition='background .8s ease';
  pad.style.background=color;

  if(!testedSet.has(s.id)){
    testedSet.add(s.id);
    testedCount=testedSet.size;
    document.getElementById('dCount').textContent=testedCount;
  }

  document.getElementById('iPH').textContent=measured.toFixed(2);
  document.getElementById('iPHLabel').textContent='pH (实测)';
  document.getElementById('iType').textContent=s.cat;

  const el=document.getElementById('result');
  el.className='result done';
  el.style.background='transparent';
  el.innerHTML=`
    <div class="remoji">${pHEmojis[idx]}</div>
    <div>pH <strong>${measured.toFixed(2)}</strong> · ${pHNames[idx]}</div>
    <div class="rsub">${pHDescs[idx]}（标准值 ${s.pH.toFixed(1)}）</div>
  `;
  el.style.border=`2px solid ${color}`;
  el.style.borderRadius='8px';
  el.style.padding='6px 10px';
}

// 点击试纸区域也可以浸入
document.getElementById('stripWrap').addEventListener('click',dipStrip);

document.getElementById('btnDip').addEventListener('click',dipStrip);
document.getElementById('btnReset').addEventListener('click',()=>{
  selected=null;
  dipped=false;
  document.querySelectorAll('.sample').forEach(el=>el.classList.remove('active'));
  document.getElementById('stripPad').style.transition='background .3s';
  document.getElementById('stripPad').style.background='#f0f0e8';
  document.getElementById('result').className='result unknown';
  document.getElementById('result').innerHTML='👆 先选一种水样，再点试纸浸入';
  document.getElementById('result').style.border='none';
  document.getElementById('iCurrent').textContent='未选择';
  document.getElementById('iPH').textContent='--';
  document.getElementById('iType').textContent='--';
});

// First sample auto-select
selectSample('tap');
</script>

</body>
</html>
