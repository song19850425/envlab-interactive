<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>pH Meter Pro · 交互式模拟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f23;color:#e0e0f0;font-family:'Inter','PingFang SC',sans-serif;overflow-x:hidden;user-select:none}
.app{max-width:980px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
header h1 small{font-size:10px;font-weight:400;color:#666;letter-spacing:0}
.status{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.03);font-size:10px;color:#888}
.dot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block}
.dot.g{background:#00ff80}.dot.y{background:#ffcc00}.dot.r{background:#ff4444}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 280px;gap:10px}
@media(max-width:780px){.main{grid-template-columns:1fr}}
.left{display:flex;flex-direction:column;gap:10px}

/* BENCH */
.bench{background:#14142a;border-radius:12px;border:1px solid rgba(255,255,255,.06);padding:16px 12px;position:relative;min-height:200px}
.bench-label{font-size:9px;color:#555;letter-spacing:1px;margin-bottom:10px}
.solution-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.beaker{height:95px;border-radius:0 0 8px 8px;border:1.5px solid rgba(255,255,255,.1);border-top:none;cursor:pointer;position:relative;transition:.2s;background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px}
.beaker:hover{transform:translateY(-4px)}
.beaker.ac{border-color:#00b4ff;box-shadow:0 0 12px rgba(0,180,255,.15);transform:translateY(-4px)}
.beaker .liq{position:absolute;bottom:0;left:1px;right:1px;border-radius:0 0 7px 7px;height:55px;transition:background .3s}
.beaker .bn{font-size:8px;color:#888;position:relative;z-index:1;text-align:center;line-height:1.2;margin-bottom:2px;max-width:66px}
.beaker .bt{font-size:7px;color:#555;position:relative;z-index:1}
.beaker.drag-over{border-color:#ff0080;box-shadow:0 0 16px rgba(255,0,128,.2)}

/* METER PANEL */
.meter-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.meter-panel{grid-template-columns:1fr}}
.meter-display{text-align:center;background:#0a0a1e;border-radius:12px;border:1px solid rgba(255,255,255,.06);padding:16px}
.meter-display .pv{font-size:72px;font-weight:900;line-height:1;transition:color .3s;letter-spacing:-3px}
.meter-display .pu{font-size:11px;color:#666;margin-top:-4px}
.meter-display .pl{font-size:11px;margin-top:4px;font-weight:500}
.meter-display .ms{width:100%;height:8px;border-radius:4px;margin:8px auto 0;position:relative;overflow:hidden;background:linear-gradient(90deg,#ff3333,#ff9933,#ffcc00,#66cc66,#3399ff,#6633cc)}
.meter-display .mf{height:100%;border-radius:4px;transition:width .6s ease,background .6s;width:50%}
.meter-display .sl{display:flex;justify-content:space-between;font-size:8px;color:#444;margin-top:1px}

/* CONTROLS */
.controls{padding:12px;background:#0a0a1e;border-radius:12px;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:8px}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl label{font-size:10px;color:#888;min-width:40px}
.ctrl input[type=range]{flex:1;height:3px;accent-color:#00b4ff}
.ctrl .cv{font-size:10px;font-weight:600;min-width:28px;text-align:right;color:#00b4ff}
.btns{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:5px;border:none;font-size:10px;font-weight:500;cursor:pointer;transition:.15s;font-family:inherit}
.btn-b{background:#00b4ff;color:#fff}.btn-b:hover{background:#0098d8}
.btn-p{background:#ff0080;color:#fff}.btn-p:hover{background:#d8006b}
.btn-o{background:transparent;border:1px solid rgba(255,255,255,.1);color:#aaa}
.btn-o:hover{background:rgba(255,255,255,.05)}
.btn-o.done{border-color:#00ff80;color:#00ff80;background:rgba(0,255,128,.08)}
.cal-status{font-size:9px;color:#555;margin-top:2px}

/* RIGHT PANEL */
.right{display:flex;flex-direction:column;gap:8px}
.panel{background:#14142a;border-radius:12px;border:1px solid rgba(255,255,255,.06);padding:12px}
.panel h3{font-size:10px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:8px}
.record{font-size:10px;color:#aaa;line-height:1.8;font-family:monospace;max-height:130px;overflow-y:auto}
.record div{display:grid;grid-template-columns:50px 1fr 40px;gap:4px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.record .rt{color:#555}
.record .rv{font-weight:600;text-align:right}
.history{max-height:140px;overflow-y:auto}
.hist-item{display:grid;grid-template-columns:55px 1fr 35px 35px;gap:3px;padding:3px 6px;font-size:9px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center}
.hist-item .ht{color:#555}
.hist-item .hv{font-weight:600}
.hist-item .hs{color:#888}
.cal-chart{display:flex;gap:6px;align-items:flex-end;height:50px;padding:4px 0}
.cal-bar{flex:1;border-radius:3px 3px 0 0;transition:height .8s,background .8s;min-width:20px;position:relative;text-align:center;font-size:7px;color:#555;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:2px}
.cal-bar .bv{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600;white-space:nowrap}
.elec{position:fixed;width:60px;height:160px;pointer-events:none;z-index:100;opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:center}
.elec .rod{width:4px;height:80px;background:linear-gradient(180deg,#888,#444);border-radius:2px}
.elec .tip{width:14px;height:14px;border-radius:50%;background:#555;margin-top:-2px;border:2px solid #888}
.elec.show{opacity:1}
.hint{font-size:9px;color:#555;text-align:center;padding:4px}
</style></head><body>
<div class="app">
<header>
<h1>🧪 pH Meter Pro <small>HJ 1147-2020 · 交互式模拟</small></h1>
<div class="status"><span class="dot" id="sDot"></span><span id="sTxt">就绪</span></div>
</header>

<div class="main">
<div class="left">
<!-- Bench -->
<div class="bench" id="bench">
<div class="bench-label">▼ 拖拽电极到溶液中 · 或点击选择</div>
<div class="solution-grid" id="solGrid"></div>
</div>

<!-- Meter -->
<div class="meter-panel">
<div class="meter-display">
<div class="pv" id="phVal">7.00</div>
<div class="pu">pH</div>
<div class="pl" id="phLbl" style="color:#666">选择溶液开始测量</div>
<div class="ms"><div class="mf" id="phFill"></div></div>
<div class="sl"><span>0</span><span>4</span><span>7</span><span>10</span><span>14</span></div>
</div>
<div class="controls">
<div class="ctrl"><label>🌡️ 温度</label><input type="range" min="0" max="50" value="25" id="tmpS" oninput="setT(this.value)"><span class="cv" id="tmpV">25°C</span></div>
<div class="ctrl" style="flex-wrap:wrap;gap:3px">
<button class="btn btn-o" id="c0" onclick="cal(0)">校准 4.00</button>
<button class="btn btn-o" id="c1" onclick="cal(1)">校准 6.86</button>
<button class="btn btn-o" id="c2" onclick="cal(2)">校准 9.18</button>
</div>
<div class="btns">
<button class="btn btn-b" id="recBtn" onclick="rec()">📝 记录</button>
<button class="btn btn-p" onclick="rst()">↺ 重置</button>
</div>
<div class="cal-status" id="calStat">⚡ 未校准 · 测量误差约 ±0.3 pH</div>
</div>
</div>
</div>

<!-- Right Panel -->
<div class="right">
<div class="panel"><h3>📊 校准状态</h3><div class="cal-chart" id="calChart"></div></div>
<div class="panel"><h3>📋 测量记录</h3><div class="history" id="history"><div class="hist-item" style="color:#555;grid-template-columns:1fr">暂无记录</div></div></div>
<div class="panel"><h3>📜 实验日志</h3><div class="record" id="log"></div></div>
</div>
</div>

<div class="hint" id="hint">💡 先校准电极：点击「校准 4.00」→「6.86」→「9.18」，再选择水样测量</div>
</div>

<script>
const samples = [
  {id:'b0',name:'pH 4.00',ph:4.00,grp:'std',color:'#ff4444',desc:'邻苯二甲酸氢钾缓冲液'},
  {id:'b1',name:'pH 6.86',ph:6.86,grp:'std',color:'#e8d48b',desc:'混合磷酸盐缓冲液'},
  {id:'b2',name:'pH 9.18',ph:9.18,grp:'std',color:'#3a7bd5',desc:'四硼酸钠缓冲液'},
  {id:'b3',name:'自来水',ph:7.8,grp:'water',color:'#87ceeb',desc:'GB 5749 生活饮用水'},
  {id:'b4',name:'河水',ph:6.5,grp:'water',color:'#5b8c5a',desc:'GB 3838 地表水Ⅲ类'},
  {id:'b5',name:'工业废水',ph:3.2,grp:'water',color:'#c86432',desc:'酸性废水（超标）'},
  {id:'b6',name:'地下水',ph:7.2,grp:'water',color:'#6ba3d6',desc:'GB/T 14848 Ⅲ类'},
  {id:'b7',name:'雨水',ph:5.6,grp:'water',color:'#b0c4de',desc:'酸雨阈值 pH 5.6'},
  {id:'b8',name:'泳池水',ph:7.4,grp:'water',color:'#00ced1',desc:'含氯消毒 微碱性'},
  {id:'b9',name:'纯水',ph:6.8,grp:'water',color:'#e0f0ff',desc:'实验室去离子水'}
];

let sel=0,tmp=25,calDone=[false,false,false],logs=[],recs=[];
const names=['pH 4.00 缓冲液','pH 6.86 缓冲液','pH 9.18 缓冲液'];

// Render solutions
function render() {
  let g=document.getElementById('solGrid');
  g.innerHTML=samples.map((s,i)=>`
    <div class="beaker" id="${s.id}" onclick="pick(${i})" draggable="false">
      <div class="liq" style="background:${s.color}"></div>
      <div class="bn">${s.name}</div>
      <div class="bt">${s.grp==='std'?'标准液':'水样'}</div>
    </div>`).join('');
}
render();

function pick(n) {
  sel=n;
  document.querySelectorAll('.beaker').forEach((b,i)=>b.classList.toggle('ac',i===n));
  update();
  log(`选择 ${samples[n].name}`);
}

function update() {
  let s=samples[sel];
  let offset=calOff();
  let tempComp=(tmp-25)*0.003;
  let ph=Math.max(0,Math.min(14,s.ph+offset+tempComp));
  
  document.getElementById('phVal').textContent=ph.toFixed(2);
  let pct=ph/14*100;
  let f=document.getElementById('phFill');
  f.style.width=Math.min(100,Math.max(0,pct))+'%';
  
  let h;
  if(ph<3)h=0;else if(ph<5)h=15;else if(ph<6.5)h=40;else if(ph<7.5)h=120;else if(ph<9)h=200;else if(ph<11)h=240;else h=280;
  let col=`hsl(${h},75%,${ph>2&&ph<12?48:38}%)`;
  document.getElementById('phVal').style.color=col;
  f.style.background=col;
  
  let type=ph<5.6?'酸性':ph<6.5?'弱酸性':ph<7.5?'中性':ph<8.5?'弱碱性':'碱性';
  let calS=calDone.filter(Boolean).length;
  let calT=calS===3?'✅ 已校准':calS>0?'⚠️ 部分校准':'❌ 未校准';
  document.getElementById('phLbl').textContent=`${type} · ${s.desc} ${calT}`;
  document.getElementById('phLbl').style.color=col;
}

function calOff() {
  let n=calDone.filter(Boolean).length;
  if(n===3)return 0;
  if(n===2)return 0.05;
  if(n===1)return 0.15;
  return 0.3;
}

function setT(v) {
  tmp=parseFloat(v);
  document.getElementById('tmpV').textContent=v+'°C';
  update();
}

function cal(n) {
  if(calDone[n])return;
  calDone[n]=true;
  let btn=document.getElementById('c'+n);
  btn.classList.add('done');
  btn.textContent='✅ '+names[n];
  
  let c=calDone.filter(Boolean).length;
  let st=document.getElementById('calStat');
  if(c===3){st.textContent='🎯 三点校准完成 · 精度 ±0.02 pH';st.style.color='#00ff80';log('✅ 三点校准完成');}
  else{st.textContent=`⚠️ ${c}/3 点校准完成 · 误差 ±${c===2?'0.05':'0.15'} pH`;st.style.color='#ffcc00';log(`✅ ${names[n]} 校准完成`);}
  
  update();
  renderCalChart();
}

function renderCalChart() {
  let c=document.getElementById('calChart');
  let before=[0.3,0.15,0.05,0],after=[0.3,0.15,0.05,0];
  let labels=['未校准','1点','2点','3点'];
  let h=calDone.filter(Boolean).length;
  c.innerHTML=labels.map((l,i)=>`
    <div class="cal-bar" style="height:${20+(3-i)*10}px;background:${i<=h?'rgba(0,255,128,.3)':'rgba(255,255,255,.05)'}">
      <span class="bv" style="color:${i<=h?'#00ff80':'#555'}">±${before[i]}</span>
      ${l}
    </div>`).join('');
}
renderCalChart();

function rec() {
  let s=samples[sel];
  let offset=calOff();
  let ph=Math.max(0,Math.min(14,s.ph+offset+(tmp-25)*0.003));
  let t=new Date();
  let ts=`${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
  
  recs.push({time:ts,name:s.name,ph:ph.toFixed(2),type:s.grp==='std'?'标准':'水样'});
  
  let h=document.getElementById('history');
  h.innerHTML=recs.map(r=>`
    <div class="hist-item">
      <span class="ht">${r.time}</span>
      <span class="hv" style="color:${phColor(parseFloat(r.ph))}">${r.name}</span>
      <span style="font-weight:600;color:${phColor(parseFloat(r.ph))}">${r.ph}</span>
      <span class="hs">${r.type}</span>
    </div>`).join('')+'<div class="hist-item" style="grid-template-columns:1fr;font-size:8px;color:#555;cursor:pointer" onclick="exportRec()">📤 导出数据</div>';
  
  log(`📝 记录 ${s.name}: pH ${ph.toFixed(2)}`);
  let btn=document.getElementById('recBtn');
  btn.textContent='✅ 已记录';
  setTimeout(()=>btn.textContent='📝 记录',800);
}

function phColor(ph) {
  if(ph<4)return '#ff4444';if(ph<6)return '#ff9933';if(ph<7.5)return '#66cc66';if(ph<9)return '#3399ff';return '#6633cc';
}

function exportRec() {
  if(recs.length===0)return;
  let csv='时间,样品,pH,类型\n'+recs.map(r=>`${r.time},${r.name},${r.ph},${r.type}`).join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`pH测量记录_${new Date().toLocaleDateString()}.csv`;
  a.click();
  log('📤 测量数据已导出为 CSV');
}

function log(msg) {
  let l=document.getElementById('log');
  let t=new Date();
  let ts=`${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
  l.innerHTML+=`<div><span class="rt">${ts}</span><span>${msg}</span></div>`;
  l.scrollTop=l.scrollHeight;
  
  let dot=document.getElementById('sDot'),txt=document.getElementById('sTxt');
  if(msg.includes('✅')){dot.className='dot g';txt.textContent=msg.replace('✅','');}
  else if(msg.includes('⚠️')){dot.className='dot y';txt.textContent=msg;}
  else if(msg.includes('❌')){dot.className='dot r';txt.textContent=msg;}
  else{dot.className='dot g';txt.textContent=msg.replace(/[📝📤💡🔄]/g,'');}
}

function rst() {
  calDone=[false,false,false];
  [0,1,2].forEach(i=>{let b=document.getElementById('c'+i);b.classList.remove('done');b.textContent=['校准 4.00','校准 6.86','校准 9.18'][i];});
  document.getElementById('calStat').textContent='⚡ 未校准 · 测量误差约 ±0.3 pH';
  document.getElementById('calStat').style.color='#555';
  tmp=25;document.getElementById('tmpS').value=25;document.getElementById('tmpV').textContent='25°C';
  sel=0;
  document.querySelectorAll('.beaker').forEach((b,i)=>b.classList.toggle('ac',i===0));
  renderCalChart();
  recs=[];document.getElementById('history').innerHTML='<div class="hist-item" style="color:#555;grid-template-columns:1fr">暂无记录</div>';
  document.getElementById('log').innerHTML='';
  update();
  log('🔄 系统已重置');
}

// Drag electrode simulation
let isDragging=false;
document.addEventListener('mousemove',(e)=>{
  let beakers=document.querySelectorAll('.beaker');
  beakers.forEach(b=>{
    let r=b.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      b.classList.add('drag-over');
    }else{b.classList.remove('drag-over')}
  });
});

// Init
update();
log('💡 提示：先点击3个标准液校准，再测量水样');
</script>
</body></html>
